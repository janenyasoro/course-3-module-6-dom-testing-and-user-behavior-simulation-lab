<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOM Testing Lab</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="traffic-lights">
        <span class="dot dot-close"></span>
        <span class="dot dot-minimize"></span>
        <span class="dot dot-fullscreen"></span>
      </div>
      <h1>DOM Testing and User Behavior Simulation</h1>
    </header>

    <main class="app-main">
      <section class="glass-card">
        <button id="simulate-click" class="primary-btn">
          Simulate Click
        </button>

        <form id="user-form" class="form">
          <input
            type="text"
            id="user-input"
            placeholder="Enter text"
            autocomplete="off"
          >
          <button type="submit" class="primary-btn">Submit</button>
        </form>

        <div id="dynamic-content" class="dynamic-panel"></div>
        <div id="error-message" class="hidden error-text"></div>
      </section>
    </main>
  </div>

  <script src="../index.js"></script>
</body>
</html>
